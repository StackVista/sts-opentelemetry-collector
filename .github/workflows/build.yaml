name: CI

on:
  push:
    branches:
      - '*'
    tags:
      - 'v*'
      - 'test-*'

env:
  REGISTRY: quay.io
  IMAGE_NAME: stackstate/sts-opentelemetry-collector
  GO_VERSION: 1.25.8
  GOLANGCI_LINT_VERSION: v2.4
  TRIVY_IMAGE: ${{ vars.TRIVY_IMAGE }}

jobs:
  build:
    name: Docker image build, Trivy secret/vulnerability scan, and publish
    runs-on: ubuntu-latest
    # Sets the permissions granted to the `GITHUB_TOKEN` for the actions in this job.
    permissions:
        contents: read
        packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.publish.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{github.repository_owner}}/${{ github.repository }}
      - name: Install protoc # TODO create a docker image with protoc installed
        run: |
          sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.8
      - name: Generate go model
        env:
          GITLAB_READ_TOKEN: ${{ secrets.GITLAB_READ_TOKEN }}
        run: |
          ./connector/topologyconnector/scripts/generate_protobuf_model.sh
          ./extension/settingsproviderextension/scripts/generate_openapi_model.sh
          ./scripts/check_no_changes.sh
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Trivy secret/vulnerability scan amd64 image locally
        env:
          IMAGE_LABELS: ${{ steps.meta.outputs.labels }}
          TRIVY_IMAGE: ${{ env.TRIVY_IMAGE }}
        run: scripts/build-and-scan-image.sh

      - name: Login to the container registry after scan
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USER }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Publish scanned image
        id: publish
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
          IMAGE_LABELS: ${{ steps.meta.outputs.labels }}
        run: scripts/publish-scanned-image.sh

  detect-modules:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.set-modules.outputs.modules }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - id: set-modules
        run: echo "modules=$(go list -m -json | jq -s '.' | jq -c '[.[].Dir]')" >> $GITHUB_OUTPUT

  lint:
    needs: detect-modules
    runs-on: ubuntu-latest
    strategy:
      matrix:
        modules: ${{ fromJSON(needs.detect-modules.outputs.modules) }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: golangci-lint ${{ matrix.modules }}
        uses: golangci/golangci-lint-action@v8
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          working-directory: ${{ matrix.modules }}

  test:
    runs-on: ubuntu-latest
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:latest
        ports:
          - "9000:9000"
          - "8123:8123"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run tests
        run: |
          go test ./exporter/clickhousestsexporter/...
          go test ./exporter/stskafkaexporter/...
          go test ./exporter/ststopologyexporter/...
          go test ./extension/servicetokenauthextension/...
          go test ./extension/settingsproviderextension/...
          go test ./connector/stsservicegraphconnector/...
          go test ./connector/topologyconnector/...
  integration-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Set up Docker
        uses: docker/setup-buildx-action@v3
      - name: Run integration tests
        run: |
          (cd exporter/stskafkaexporter/integration && GOWORK=off go test -tags=integration ./...)
          (cd extension/settingsproviderextension/integration && GOWORK=off go test -tags=integration ./...)
  e2e-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Set up Docker
        uses: docker/setup-buildx-action@v3
      # The metadata-action produces multi-line tags when a git tag is pushed.
      # Example: "quay.io/stackstate/sts-opentelemetry-collector:v0.0.24\nquay.io/stackstate/sts-opentelemetry-collector:latest"
      # Extract only the first tag so OTEL_COLLECTOR_IMAGE gets a clean value.
      - name: Select first image tag
        id: select_tag
        run: echo "tag=$(echo '${{ needs.build.outputs.image }}' | head -n 1)" >> "$GITHUB_OUTPUT"
      - name: Run E2E tests
        env:
          OTEL_COLLECTOR_IMAGE: ${{ steps.select_tag.outputs.tag }}@${{ needs.build.outputs.digest }}
        run: go test -v ./test/e2e/...
