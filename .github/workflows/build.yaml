name: CI

on:
  push:
    branches:
      - '*'
    tags:
      - 'v*'
      - 'test-*'

env:
  REGISTRY: quay.io
  IMAGE_NAME: stackstate/sts-opentelemetry-collector
  GO_VERSION: 1.26.3
  GOLANGCI_LINT_VERSION: v2.12.2

# Default to read-only at the workflow level. Jobs that need more
# (publish: packages:write; scan: security-events:write for SARIF upload)
# opt in explicitly.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: linux-amd64
            platform: linux/amd64
          - arch: linux-arm64
            platform: linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Docker meta (labels only)
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{github.repository_owner}}/${{ github.repository }}

      - name: Install protoc # TODO create a docker image with protoc installed
        run: |
          sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.8

      - name: Generate go model
        env:
          GITLAB_READ_TOKEN: ${{ secrets.GITLAB_READ_TOKEN }}
        run: |
          ./connector/topologyconnector/scripts/generate_protobuf_model.sh
          ./extension/settingsproviderextension/scripts/generate_openapi_model.sh
          ./scripts/check_no_changes.sh

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build ${{ matrix.platform }} to local docker tarball
        # Per-arch single-platform build, output as a docker-format tarball
        # (not pushed). The tarball is uploaded as an artifact so scan, e2e,
        # and publish can each `docker load` it without the registry seeing
        # bytes that have not yet passed scan.
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=docker,dest=/tmp/image.tar
          tags: sts-opentelemetry-collector:build
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false

      - name: Upload image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: image-${{ matrix.arch }}
          path: /tmp/image.tar
          retention-days: 1

  scan:
    name: Scan (${{ matrix.arch }})
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # for SARIF upload from inside the action
    strategy:
      fail-fast: false
      matrix:
        arch: [linux-amd64, linux-arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: image-${{ matrix.arch }}
          path: /tmp

      - name: Load image into local docker daemon
        run: |
          set -euo pipefail
          loaded=$(docker load -i /tmp/image.tar | awk -F': ' '/Loaded image/ {print $NF}')
          echo "Loaded $loaded"
          docker tag "$loaded" scan-target:${{ matrix.arch }}

      - name: Run image-pipeline scan-image
        uses: StackVista/image-pipeline/.github/actions/scan-image@dfbfa39e887dfdce25e185b6fac52e325de811af
        with:
          image: scan-target:${{ matrix.arch }}
          mode: gate
          sarif-category: sts-opentelemetry-collector-${{ matrix.arch }}

  publish:
    name: Publish release tags
    needs: [build, scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Quay
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USER }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Compute scan-handle tag base
        id: scan_base
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          sanitized="${GITHUB_REF_NAME//\//-}"
          echo "tag=${REGISTRY}/${IMAGE_NAME}:scan-${sanitized}" >> "$GITHUB_OUTPUT"

      - name: Docker meta (release tags)
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Download all image artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: image-*
          path: /tmp/artifacts

      - name: Push per-arch and assemble multi-arch manifest
        # Two-stage push:
        #   1. Each per-arch tarball is loaded, tagged with a mutable
        #      per-ref handle (`scan-<ref>-<arch>`), and pushed. The handle
        #      tag exists only so `imagetools create` can address the
        #      per-arch manifest by digest.
        #   2. `docker buildx imagetools create` assembles a fresh
        #      multi-arch manifest list from the per-arch digests and
        #      attaches every release tag emitted by metadata-action in one
        #      operation.
        env:
          SCAN_BASE: ${{ steps.scan_base.outputs.tag }}
          RELEASE_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail

          per_arch_refs=()
          for arch in linux-amd64 linux-arm64; do
            tarball="/tmp/artifacts/image-${arch}/image.tar"
            loaded=$(docker load -i "$tarball" | awk -F': ' '/Loaded image/ {print $NF}')
            arch_tag="${SCAN_BASE}-${arch}"
            docker tag "$loaded" "$arch_tag"
            docker push "$arch_tag"
            # Resolve the manifest digest via inspect rather than parsing
            # `docker push` stdout — the `digest:` line format has shifted
            # between docker versions.
            digest=$(docker buildx imagetools inspect "$arch_tag" --format '{{.Manifest.Digest}}')
            per_arch_refs+=("${SCAN_BASE%:*}@${digest}")
          done

          tag_args=()
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            tag_args+=(--tag "$tag")
          done <<< "$RELEASE_TAGS"

          if [ "${#tag_args[@]}" -eq 0 ]; then
            echo "::notice::metadata-action produced no release tags for this ref; skipping multi-arch assembly"
            exit 0
          fi

          docker buildx imagetools create "${tag_args[@]}" "${per_arch_refs[@]}"

  detect-modules:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      modules: ${{ steps.set-modules.outputs.modules }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - id: set-modules
        run: echo "modules=$(go list -m -json | jq -s '.' | jq -c '[.[].Dir]')" >> "$GITHUB_OUTPUT"

  lint:
    needs: detect-modules
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        modules: ${{ fromJSON(needs.detect-modules.outputs.modules) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: golangci-lint ${{ matrix.modules }}
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          working-directory: ${{ matrix.modules }}

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      clickhouse:
        image: clickhouse/clickhouse-server@sha256:6d8f358747b59f7db044749eaf951e828e75cc16f9c487f855b114272c44b82c # latest as of 2026-05-15
        ports:
          - "9000:9000"
          - "8123:8123"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Run tests
        run: |
          go test ./exporter/clickhousestsexporter/...
          go test ./exporter/stskafkaexporter/...
          go test ./exporter/ststopologyexporter/...
          go test ./extension/servicetokenauthextension/...
          go test ./extension/settingsproviderextension/...
          go test ./connector/stsservicegraphconnector/...
          go test ./connector/topologyconnector/...

  integration-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Set up Docker
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Run integration tests
        run: |
          (cd exporter/stskafkaexporter/integration && GOWORK=off go test -tags=integration ./...)
          (cd extension/settingsproviderextension/integration && GOWORK=off go test -tags=integration ./...)

  e2e-test:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Set up Docker
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Download amd64 image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: image-linux-amd64
          path: /tmp

      - name: Load image into local docker daemon
        run: |
          set -euo pipefail
          loaded=$(docker load -i /tmp/image.tar | awk -F': ' '/Loaded image/ {print $NF}')
          docker tag "$loaded" sts-opentelemetry-collector:e2e

      - name: Run E2E tests
        env:
          OTEL_COLLECTOR_IMAGE: sts-opentelemetry-collector:e2e
        run: go test -v ./test/e2e/...
