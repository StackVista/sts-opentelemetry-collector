name: CI

on:
  push:
    branches:
      - '*'
    tags:
      - 'v*'
      - 'test-*'

env:
  REGISTRY: quay.io
  IMAGE_NAME: stackstate/sts-opentelemetry-collector
  GO_VERSION: 1.26.3
  GOLANGCI_LINT_VERSION: v2.12.2

# Default to read-only at the workflow level. Jobs that need more
# (publish: packages:write; scan: security-events:write for SARIF upload)
# opt in explicitly.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  image-pipeline:
    uses: StackVista/image-pipeline/.github/workflows/reusable-image-pipeline.yml@v0.1.0
    with:
      image: quay.io/stackstate/sts-opentelemetry-collector
      tag: "" # depends on the branch
      source_registry: quay.io
    secrets:
      source_registry_user: ${{ secrets.QUAY_USERNAME }}
      source_registry_password: ${{ secrets.QUAY_PASSWORD }}

  detect-modules:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      modules: ${{ steps.set-modules.outputs.modules }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - id: set-modules
        run: echo "modules=$(go list -m -json | jq -s '.' | jq -c '[.[].Dir]')" >> "$GITHUB_OUTPUT"

  lint:
    needs: detect-modules
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        modules: ${{ fromJSON(needs.detect-modules.outputs.modules) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: golangci-lint ${{ matrix.modules }}
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          working-directory: ${{ matrix.modules }}

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      clickhouse:
        image: clickhouse/clickhouse-server@sha256:6d8f358747b59f7db044749eaf951e828e75cc16f9c487f855b114272c44b82c # latest as of 2026-05-15
        ports:
          - "9000:9000"
          - "8123:8123"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Run tests
        run: |
          go test ./exporter/clickhousestsexporter/...
          go test ./exporter/stskafkaexporter/...
          go test ./exporter/ststopologyexporter/...
          go test ./extension/servicetokenauthextension/...
          go test ./extension/settingsproviderextension/...
          go test ./connector/stsservicegraphconnector/...
          go test ./connector/topologyconnector/...

  integration-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Set up Docker
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Run integration tests
        run: |
          (cd exporter/stskafkaexporter/integration && GOWORK=off go test -tags=integration ./...)
          (cd extension/settingsproviderextension/integration && GOWORK=off go test -tags=integration ./...)

  e2e-test:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Set up Docker
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Download amd64 image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: image-linux-amd64
          path: /tmp

      - name: Load image into local docker daemon
        run: |
          set -euo pipefail
          loaded=$(docker load -i /tmp/image.tar | awk -F': ' '/Loaded image/ {print $NF}')
          docker tag "$loaded" sts-opentelemetry-collector:e2e

      - name: Run E2E tests
        env:
          OTEL_COLLECTOR_IMAGE: sts-opentelemetry-collector:e2e
        run: go test -v ./test/e2e/...
