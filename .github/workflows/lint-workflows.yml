name: Workflow Security Audit

# zizmor security audit of .github/workflows/.

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".zizmor.yml"
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".zizmor.yml"

concurrency:
  group: lint-workflows-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  zizmor:
    name: zizmor
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: zizmorcore/zizmor-action@b572f7b1a1c2d41efaab43d504f68d215c3cd727 # v0.5.4
        with:
          advanced-security: false
