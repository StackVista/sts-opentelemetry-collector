# De-templated copy of the agent telemetry-gateway collector config from
# helm-charts-internal/stable/suse-observability-agent/templates/otel/telemetrygateway/configmap.yaml
#
# Kept in sync with the chart. Helm templating, ${env:...} references and the
# dynamically-chosen exporter name have been replaced with literal values so the
# OTel Collector `validate` subcommand can load it. This fixture is the one that
# exercises the span_metrics connector from the strict agent BOM.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  prometheus/self:
    config:
      scrape_configs:
        - job_name: opentelemetry-collector
          scrape_interval: 30s
          static_configs:
            - targets:
                - 127.0.0.1:8888
              labels:
                k8s.pod.uid: pod-uid

processors:
  memory_limiter:
    check_interval: 5s
    limit_percentage: 80
    spike_limit_percentage: 25
  transform/pre-k8sattributes:
    error_mode: ignore
    trace_statements:
      - context: resource
        statements:
          - delete_key(resource.attributes, "k8s.cluster.name")
          - delete_key(resource.attributes, "k8s.namespace.name")
    metric_statements:
      - context: resource
        statements:
          - delete_key(resource.attributes, "k8s.cluster.name")
          - delete_key(resource.attributes, "k8s.namespace.name")
    log_statements:
      - context: resource
        statements:
          - delete_key(resource.attributes, "k8s.cluster.name")
          - delete_key(resource.attributes, "k8s.namespace.name")
  k8s_attributes:
    auth_type: serviceAccount
    extract:
      labels:
        - from: pod
          key_regex: (.*)
          tag_name: $$1
      metadata:
        - k8s.namespace.name
        - k8s.deployment.name
        - k8s.statefulset.name
        - k8s.daemonset.name
        - k8s.cronjob.name
        - k8s.job.name
        - k8s.node.name
        - k8s.pod.name
        - k8s.pod.uid
        - k8s.pod.start_time
    passthrough: false
    pod_association:
      - sources:
          - from: resource_attribute
            name: k8s.pod.uid
      - sources:
          - from: resource_attribute
            name: k8s.pod.ip
      - sources:
          - from: connection
  transform/enrich-resource:
    error_mode: ignore
    trace_statements:
      - context: resource
        statements:
          - set(resource.attributes["k8s.cluster.name"], "test-cluster")
          - set(resource.attributes["service.instance.id"], resource.attributes["k8s.pod.uid"]) where resource.attributes["service.instance.id"] == nil and resource.attributes["k8s.pod.uid"] != nil
          - set(resource.attributes["service.namespace"], resource.attributes["k8s.namespace.name"]) where resource.attributes["service.namespace"] == nil and resource.attributes["k8s.namespace.name"] != nil
    metric_statements:
      - context: resource
        statements:
          - set(resource.attributes["k8s.cluster.name"], "test-cluster")
          - set(resource.attributes["service.instance.id"], resource.attributes["k8s.pod.uid"]) where resource.attributes["service.instance.id"] == nil and resource.attributes["k8s.pod.uid"] != nil
          - set(resource.attributes["service.namespace"], resource.attributes["k8s.namespace.name"]) where resource.attributes["service.namespace"] == nil and resource.attributes["k8s.namespace.name"] != nil
    log_statements:
      - context: resource
        statements:
          - set(resource.attributes["k8s.cluster.name"], "test-cluster")
          - set(resource.attributes["service.instance.id"], resource.attributes["k8s.pod.uid"]) where resource.attributes["service.instance.id"] == nil and resource.attributes["k8s.pod.uid"] != nil
          - set(resource.attributes["service.namespace"], resource.attributes["k8s.namespace.name"]) where resource.attributes["service.namespace"] == nil and resource.attributes["k8s.namespace.name"] != nil
  transform/self-metrics:
    error_mode: ignore
    metric_statements:
      - context: resource
        statements:
          - set(resource.attributes["k8s.cluster.name"], "test-cluster")
          - set(resource.attributes["k8s.namespace.name"], "test-namespace")
          - set(resource.attributes["service.namespace"], "test-namespace") where resource.attributes["service.namespace"] == nil
  batch: {}

connectors:
  span_metrics:
    aggregation_cardinality_limit: 5000
    resource_metrics_key_attributes:
      - service.name
      - service.namespace
      - k8s.cluster.name
      - k8s.namespace.name
    histogram:
      unit: s
    metrics_expiration: 5m
    namespace: otel_span

exporters:
  otlp/suse-observability:
    auth:
      authenticator: bearertokenauth
    endpoint: suse-observability:4317
    tls:
      insecure_skip_verify: true
    compression: gzip
    timeout: 30s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
  # debug exporter from the BOM, wired the way the chart wires it when debug is enabled.
  debug:
    verbosity: basic

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777
  bearertokenauth:
    scheme: SUSEObservability
    token: "test-token"

service:
  telemetry:
    logs:
      level: info
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: "0.0.0.0"
                port: 8888
  extensions: [health_check, pprof, bearertokenauth]
  pipelines:
    traces/gateway:
      receivers: [otlp]
      processors: [memory_limiter, transform/pre-k8sattributes, k8s_attributes, transform/enrich-resource, batch]
      exporters: [span_metrics, otlp/suse-observability, debug]
    metrics/gateway:
      receivers: [otlp, span_metrics]
      processors: [memory_limiter, transform/pre-k8sattributes, k8s_attributes, transform/enrich-resource, batch]
      exporters: [otlp/suse-observability, debug]
    metrics/self:
      receivers: [prometheus/self]
      processors: [memory_limiter, transform/self-metrics, batch]
      exporters: [otlp/suse-observability]
    logs/gateway:
      receivers: [otlp]
      processors: [memory_limiter, transform/pre-k8sattributes, k8s_attributes, transform/enrich-resource, batch]
      exporters: [otlp/suse-observability, debug]
