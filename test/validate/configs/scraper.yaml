# De-templated copy of the agent Prometheus-scraper collector config from
# helm-charts-internal/stable/suse-observability-agent/templates/otel/scraper/configmap.yaml
#
# Kept in sync with the chart. Helm templating, ${env:...} references and the
# dynamically-chosen exporter name have been replaced with literal values so the
# OTel Collector `validate` subcommand can load it without a running environment.
# The mTLS branch is enabled here so the validate run covers the superset of
# components the chart can emit.
receivers:
  prometheus:
    target_allocator:
      endpoint: http://target-allocator:80
      interval: 30s
      collector_id: scraper-0
      tls:
        ca_file: /etc/otel-target-allocator/ca/ca.crt
        cert_file: /etc/otel-target-allocator/tls/tls.crt
        key_file: /etc/otel-target-allocator/tls/tls.key
        reload_interval: 1m
  prometheus/self:
    config:
      scrape_configs:
        - job_name: opentelemetry-collector
          scrape_interval: 30s
          static_configs:
            - targets:
                - 127.0.0.1:8888
              labels:
                k8s.pod.uid: pod-uid

processors:
  memory_limiter:
    check_interval: 5s
    limit_percentage: 80
    spike_limit_percentage: 25
  transform/pre-k8sattributes:
    error_mode: ignore
    metric_statements:
      - context: resource
        statements:
          - delete_key(attributes, "k8s.namespace.name")
  k8sattributes:
    auth_type: serviceAccount
    extract:
      labels:
        - from: pod
          key_regex: (.*)
          tag_name: $$1
      metadata:
        - k8s.namespace.name
        - k8s.deployment.name
        - k8s.statefulset.name
        - k8s.daemonset.name
        - k8s.cronjob.name
        - k8s.job.name
        - k8s.node.name
        - k8s.pod.name
        - k8s.pod.uid
        - k8s.pod.start_time
    passthrough: false
    pod_association:
      - sources:
          - from: resource_attribute
            name: k8s.pod.ip
      - sources:
          - from: resource_attribute
            name: k8s.pod.uid
      - sources:
          - from: connection
  transform:
    error_mode: ignore
    metric_statements:
      - context: resource
        statements:
          - set(attributes["k8s.cluster.name"], "test-cluster")
          - set(attributes["service.instance.id"], attributes["k8s.pod.uid"]) where attributes["service.instance.id"] == nil and attributes["k8s.pod.uid"] != nil
          - set(attributes["service.namespace"], attributes["k8s.namespace.name"]) where attributes["service.namespace"] == nil and attributes["k8s.namespace.name"] != nil
  batch: {}

exporters:
  otlp/suse-observability:
    auth:
      authenticator: bearertokenauth
    endpoint: suse-observability:4317
    tls:
      insecure_skip_verify: true
    compression: gzip
    timeout: 30s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777
  bearertokenauth:
    scheme: SUSEObservability
    token: "test-token"

service:
  telemetry:
    logs:
      level: info
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: 127.0.0.1
                port: 8888
  extensions: [health_check, pprof, bearertokenauth]
  pipelines:
    metrics/prometheus-scraping:
      receivers: [prometheus, prometheus/self]
      processors: [memory_limiter, transform/pre-k8sattributes, k8sattributes, transform, batch]
      exporters: [otlp/suse-observability]
