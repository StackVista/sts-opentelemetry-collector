# De-templated copy of the agent k8s-resource collector config from
# helm-charts-internal/stable/suse-observability-agent/templates/otel/k8sresourcecollector/configmap.yaml
#
# Kept in sync with the chart. Helm templating and ${...} references have been
# replaced with literal values so the OTel Collector `validate` subcommand can
# load it. Leader election is enabled here so the validate run covers the
# k8s_leader_elector extension. The HTTP OTLP exporter (otlphttp) is used so this
# fixture exercises the otlphttp exporter from the BOM.
receivers:
  prometheus/self:
    config:
      scrape_configs:
        - job_name: k8s-resource-collector
          scrape_interval: 30s
          static_configs:
            - targets:
                - 127.0.0.1:8888
              labels:
                k8s.pod.uid: test-pod-uid
  k8sresource:
    auth_type: serviceAccount
    cluster_name: test-cluster
    snapshot_interval: 5m
    discovery_mode: api_groups
    max_cr_total_data_size_bytes: 1048576
    max_object_total_data_size_bytes: 1048576
    cr_api_groups:
      include:
        - kubevirt.io
        - openreports.io
        - policies.kubewarden.io
        - postgresql.cnpg.io
        - sbomscanner.kubewarden.io
        - security.rancher.io
        - storage.sbomscanner.kubewarden.io
        - wgpolicyk8s.io
    peer_sync_port: 4319
    peer_sync_dns: k8s-resource-collector-peers
    k8s_leader_elector: k8s_leader_elector

processors:
  transform/pre-k8sattributes:
    error_mode: ignore
    metric_statements:
      - context: resource
        statements:
          - delete_key(resource.attributes, "k8s.namespace.name")
  k8s_attributes:
    auth_type: serviceAccount
    extract:
      labels:
        - from: pod
          key_regex: (.*)
          tag_name: $$1
      metadata:
        - k8s.namespace.name
        - k8s.deployment.name
        - k8s.node.name
        - k8s.pod.name
        - k8s.pod.uid
    passthrough: false
    pod_association:
      - sources:
          - from: resource_attribute
            name: k8s.pod.uid
      - sources:
          - from: connection
  transform/self-metrics:
    error_mode: ignore
    metric_statements:
      - context: resource
        statements:
          - set(resource.attributes["k8s.cluster.name"], "test-cluster")
          - set(resource.attributes["service.name"], "suse-observability-agent-k8s-resource-collector")
          - set(resource.attributes["service.instance.id"], resource.attributes["k8s.pod.uid"]) where resource.attributes["service.instance.id"] == nil and resource.attributes["k8s.pod.uid"] != nil
          - set(resource.attributes["service.namespace"], resource.attributes["k8s.namespace.name"]) where resource.attributes["service.namespace"] == nil and resource.attributes["k8s.namespace.name"] != nil
  batch: {}

exporters:
  otlphttp/suse-observability:
    auth:
      authenticator: bearertokenauth
    endpoint: https://suse-observability:443
    tls:
      insecure_skip_verify: true
    compression: gzip
    timeout: 30s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777
  bearertokenauth:
    scheme: SUSEObservability
    token: "test-token"
  k8s_leader_elector:
    auth_type: serviceAccount
    lease_name: k8sresourcereceiver
    lease_namespace: test-namespace
    lease_duration: 15s
    renew_deadline: 10s
    retry_period: 2s

service:
  telemetry:
    logs:
      level: info
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: 127.0.0.1
                port: 8888
  extensions: [health_check, pprof, bearertokenauth, k8s_leader_elector]
  pipelines:
    logs/k8s-resource:
      receivers: [k8sresource]
      processors: []
      exporters: [otlphttp/suse-observability]
    metrics/self:
      receivers: [prometheus/self]
      processors: [transform/pre-k8sattributes, k8s_attributes, transform/self-metrics, batch]
      exporters: [otlphttp/suse-observability]
