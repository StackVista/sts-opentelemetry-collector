dist:
  name: sts-opentelemetry-collector
  description: StackState OpenTelemetry Collector
  output_path: /go/src/github.com/stackvista/sts-opentelemetry-collector/bin
  # Keep Prometheus service discovery providers except Moby. The Docker SDK module
  # has no patched Go tag for CVE-2026-34040, and this collector does not need
  # Docker daemon service discovery.
  build_tags: remove_all_sd,enable_aws_sd,enable_azure_sd,enable_consul_sd,enable_digitalocean_sd,enable_dns_sd,enable_eureka_sd,enable_gce_sd,enable_hetzner_sd,enable_ionos_sd,enable_kubernetes_sd,enable_linode_sd,enable_marathon_sd,enable_nomad_sd,enable_openstack_sd,enable_ovhcloud_sd,enable_puppetdb_sd,enable_scaleway_sd,enable_stackit_sd,enable_triton_sd,enable_uyuni_sd,enable_vultr_sd,enable_xds_sd,enable_zookeeper_sd

connectors:
  - gomod: go.opentelemetry.io/collector/connector/forwardconnector v0.149.0
  - gomod: github.com/stackvista/sts-opentelemetry-collector/connector/stsservicegraphconnector v0.0.0
    path: ./connector/stsservicegraphconnector
  - gomod: github.com/stackvista/sts-opentelemetry-collector/connector/topologyconnector v0.0.0
    path: ./connector/topologyconnector

exporters:
  - gomod: go.opentelemetry.io/collector/exporter/debugexporter v0.149.0
  - gomod: github.com/stackvista/sts-opentelemetry-collector/exporter/clickhousestsexporter v0.0.0
    path: ./exporter/clickhousestsexporter
  - gomod: github.com/stackvista/sts-opentelemetry-collector/exporter/ststopologyexporter v0.0.0
    path: ./exporter/ststopologyexporter
  - gomod: go.opentelemetry.io/collector/exporter/otlpexporter v0.149.0
  - gomod: go.opentelemetry.io/collector/exporter/otlphttpexporter v0.149.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/prometheusremotewriteexporter v0.149.0
  - gomod: github.com/stackvista/sts-opentelemetry-collector/exporter/stskafkaexporter v0.0.0
    path: ./exporter/stskafkaexporter

receivers:
  - gomod: go.opentelemetry.io/collector/receiver/otlpreceiver v0.149.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/prometheusreceiver v0.149.0

extensions:
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/healthcheckextension v0.149.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/bearertokenauthextension v0.149.0
  - gomod: github.com/stackvista/sts-opentelemetry-collector/extension/servicetokenauthextension v0.0.0
    path: ./extension/servicetokenauthextension
  - gomod: github.com/stackvista/sts-opentelemetry-collector/extension/settingsproviderextension v0.0.0
    path: ./extension/settingsproviderextension
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/pprofextension v0.149.0

processors:
  - gomod: go.opentelemetry.io/collector/processor/memorylimiterprocessor v0.149.0
  - gomod: go.opentelemetry.io/collector/processor/batchprocessor v0.149.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/attributesprocessor v0.149.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/resourceprocessor v0.149.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/k8sattributesprocessor v0.149.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/transformprocessor v0.149.0
  - gomod: github.com/stackvista/sts-opentelemetry-collector/processor/stsusageprocessor v0.0.0
    path: ./processor/stsusageprocessor

replaces:
  - github.com/stackvista/sts-opentelemetry-collector/common => ../common
