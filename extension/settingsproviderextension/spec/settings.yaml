# OpenApi header is included in this file to support code highlighting in VSCode
openapi: 3.0.3
info:
  title: Structures common to settings and api
  version: "1.0.0"

components:
  schemas:
    ComponentPresentationQueryBinding:
      type: object
      properties:
        query:
          type: string
          description: 'Stq query that defines to which components does the presentation applies to.'
      required:
        - query

    ComponentPresentationRank:
      type: object
      properties:
        specificity:
          type: number
          format: double
          description: 'Determines how much of a "specialization" this presentation is. Higher number means more specific. This is used to determine which presentation to use when multiple presentations match.'
      required:
        - specificity

    PresentationDefinition:
      type: object
      properties:
        icon:
          type: string
        overview:
          $ref: "#/components/schemas/PresentationOverview"
        highlight:
          $ref: "#/components/schemas/PresentationHighlight"
        filters:
          type: array
          items:
            $ref: "#/components/schemas/ComponentPresentationFilter"
      description: |
        Component presentation definition.
        If multiple ComponentPresentations match, `filters` are merged by filter identity with the most specific presentation winning.
        Absence of the field keeps legacy behavior (for example, ViewType-based filters) unchanged.

    PresentationName:
      type: object
      properties:
        singular:
          type: string
        plural:
          type: string
        title:
          type: string
      required:
        - singular
        - plural
        - title

    FilterName:
      type: object
      properties:
        singular:
          type: string
        plural:
          type: string
      required:
        - singular
        - plural

    PresentationOverview:
      type: object
      properties:
        name:
          $ref: "#/components/schemas/PresentationName"
        mainMenu:
          $ref: "#/components/schemas/PresentationMainMenu"
        columns:
          type: array
          items:
            $ref: '#/components/schemas/OverviewColumnDefinition'
        fixedColumns:
          type: integer
      description: |
        Overview presentation definition. The `columns` field defines the columns to show in the overview table. The `flags` field can be used to enable/disable functionalities.
        If multiple ComponentPresentations match, columns are merged by `columnId` according to binding rank. Absence of the field means no overview is shown.
      required:
        - columns
        - name

    PresentationMainMenu:
      type: object
      properties:
        group:
          type: string
        icon:
          type: string
        order:
          type: number
          format: double
      required:
        - group
        - order

    OverviewColumnDefinition:
      type: object
      properties:
        columnId:
          type: string
        title:
          type: string
        projection:
          $ref: "#/components/schemas/ComponentOverviewProjection"
      required:
        - columnId
      description: 'Definition of a column in the overview presentation. The `columnId` field is used to identify the column and merge columns from different presentations. If only the `columnId` is provided, the column will be rendered from the next more specific presentation definition.'

    PresentationHighlight:
      type: object
      properties:
        title:
          type: string
        fields:
          type: array
          items:
            $ref: '#/components/schemas/PresentationHighlightField'
        provisioning:
          $ref: '#/components/schemas/PresentationHighlightProvisioning'
        relatedResources:
          type: array
          items:
            $ref: '#/components/schemas/PresentationRelatedResource'
        events:
          $ref: '#/components/schemas/PresentationHighlightEvents'
      description: |
        Highlight presentation definition. The `fields` define the fields to show in the highlight page.
        If multiple ComponentPresentations match, fields are merged by `fieldId` according to binding rank.
        Related resources follow the same merge semantics using `resourceId` as the identity key.
      required:
        - title
        - fields

    PresentationHighlightField:
      type: object
      properties:
        fieldId:
          type: string
        title:
          type: string
        description:
          type: string
        order:
          type: number
          format: double
        projection:
          $ref: "#/components/schemas/ComponentHighlightProjection"
      required:
        - fieldId
        - title
        - order
      description: 'Definition of a field in the highlight presentation. The `fieldId` field is used to identify the field and merge fields from different presentations.'

    PresentationRelatedResource:
      type: object
      properties:
        resourceId:
          type: string
          description: 'Stable identity key for merging across presentations, analogous to fieldId and filterId.'
        title:
          type: string
          description: 'Section heading displayed in the UI for this related resource.'
        order:
          type: number
          format: double
          description: 'Display order. Higher value means it shows first in UI.'
        topologyQuery:
          type: string
          description: |
            STQL query scoping the related components. Supports template interpolation with ${*} placeholders
            (e.g. ${identifiers[0]}, ${tags['namespace']}).
            The backend intersects this query with the referenced presentation's binding query.
        presentationIdentifier:
          type: string
          description: |
            References a ComponentPresentation by identifier to reuse its overview spec (columns, name, filters)
            for rendering this related resource section. Must be within the same stackpack.
      required:
        - resourceId
        - title
        - order
      description: |
        Related resource definition for the highlight page. Each entry defines a section showing components
        related to the one being viewed, rendered using the referenced presentation's overview spec.
        Merge semantics follow highlight field rules:
        - All presentations whose binding matches the component contribute related resources.
        - Same resourceId with higher specificity wins (override).
        - Different resourceId entries are appended.
        - Display order is determined by the order field.

    ComponentHighlightProjection:
      discriminator:
        propertyName: _type
      oneOf:
        - $ref: '#/components/schemas/HealthProjection'
        - $ref: '#/components/schemas/MetricProjection'
        - $ref: '#/components/schemas/ComponentLinkProjection'
        - $ref: '#/components/schemas/TextProjection'
        - $ref: '#/components/schemas/NumericProjection'
        - $ref: '#/components/schemas/DurationProjection'
        - $ref: '#/components/schemas/RatioProjection'
        - $ref: '#/components/schemas/ContainerImageProjection'
        - $ref: '#/components/schemas/MapProjection'
      description: 'Display type and value for the field.'

    ComponentOverviewProjection:
      discriminator:
        propertyName: _type
      oneOf:
        - $ref: '#/components/schemas/HealthProjection'
        - $ref: '#/components/schemas/MetricProjection'
        - $ref: '#/components/schemas/ComponentLinkProjection'
        - $ref: '#/components/schemas/TextProjection'
        - $ref: '#/components/schemas/NumericProjection'
        - $ref: '#/components/schemas/DurationProjection'
        - $ref: '#/components/schemas/RatioProjection'
        - $ref: '#/components/schemas/ContainerImageProjection'
      description: 'Display type and value for the field.'

    HealthProjection:
      type: object
      properties:
        _type:
          type: string
          enum: [HealthProjection]
        value:
          type: string
          description: 'Cel expression that returns a string that represents a valid HealthState'
      required:
        - _type
        - value
    MapProjection:
      type: object
      properties:
        _type:
          type: string
          enum: [MapProjection]
        value:
          type: string
          description: 'Cel expression that returns a map<string,dyn>'
        asTags:
          type: boolean
          default: true
      required:
        - _type
        - value
    MetricProjection:
      type: object
      properties:
        _type:
          type: string
          enum: [MetricProjection]
        showChart:
          type: boolean
        decimalPlaces:
          type: integer
        unit:
          type: string
        query:
          type: string
          description: "Individual metric query that returns a timeseries for a specific cell."
      required:
        - _type
        - query
    ComponentLinkProjection:
      type: object
      properties:
        _type:
          type: string
          enum: [ComponentLinkProjection]
        name:
          type: string
          description: 'Cel expression that returns a string that represents the name of the component to link to'
        identifier:
          type: string
          description: 'Cel expression that returns a string that represents the identifier in order to build the link'
      required:
        - _type
        - name
        - identifier
    TextProjection:
      type: object
      properties:
        _type:
          type: string
          enum: [TextProjection]
        value:
          type: string
          description: 'Cel expression that returns a string'
        asTag:
          type: boolean
          default: false
          description: 'Should the value be rendered as a tag or as plain text'
      required:
        - _type
        - value
    NumericProjection:
      type: object
      properties:
        _type:
          type: string
          enum: [NumericProjection]
        value:
          type: string
          description: 'Cel expression that returns a number'
        unit:
          type: string
          nullable: true
        decimalPlaces:
          type: integer
      required:
        - _type
        - value
    DurationProjection:
      type: object
      properties:
        _type:
          type: string
          enum: [DurationProjection]
        startTime:
          type: string
          description: 'Cel expression that returns an ISO8601 formatted timestamp'
        endTime:
          type: string
          description: 'Cel expression that returns an ISO8601 formatted timestamp'
      required:
        - _type
        - startTime

    RatioProjection:
      type: object
      description: 'Helps rendering columns that summarize success rates'
      properties:
        _type:
          type: string
          enum: [RatioProjection]
        numerator:
          type: string
          description: 'Cel expression that returns a number'
        denominator:
          type: string
          description: 'Cel expression that returns a number'
        status:
          type: string
          description: 'Cel expression that returns a string that represents a valid HealthState'
      required:
        - _type
        - numerator
        - denominator

    ContainerImageProjection:
      type: object
      description: 'Helps rendering links for docker images'
      properties:
        _type:
          type: string
          enum: [ContainerImageProjection]
        imageId:
          type: string
          description: 'Cel expression that returns a string'
        imageName:
          type: string
          description: 'Cel expression that returns a string'
      required:
        - _type
        - imageId
        - imageName

    ComponentTypeHighlights:
      properties:
        namePlural:
          type: string
        fields:
          type: array
          items:
            $ref: "#/components/schemas/ComponentTypeField"
        about:
          $ref: "#/components/schemas/ComponentTypeAbout"
        events:
          $ref: "#/components/schemas/ComponentTypeEvents"
        showLogs:
          type: boolean
        showLastChange:
          type: boolean
        externalComponent:
          $ref: "#/components/schemas/ComponentTypeExternalComponent"
        relatedResources:
          type: array
          items:
            $ref: "#/components/schemas/ComponentTypeRelatedResources"
        metrics:
          type: array
          items:
            $ref: "#/components/schemas/ComponentHighlightMetrics"
      required:
        - namePlural
        - fields
        - about
        - events
        - showLogs
        - showLastChange
        - externalComponent
        - relatedResources
        - metrics

    ComponentTypeAbout:
      properties:
        fields:
          type: array
          items:
            type: string
      required:
        - fields
    ComponentTypeField:
      properties:
        fieldId:
          type: string
        label:
          $ref: "#/components/schemas/ComponentTypeLabel"
        valueExtractor:
          $ref: "#/components/schemas/ComponentTypeValueExtractor"
        display:
          $ref: "#/components/schemas/ComponentTypeFieldDisplay"
      required:
        - fieldId
        - label
        - valueExtractor
        - display
    ComponentTypeLabel:
      properties:
        title:
          type: string
        helpBubbleText:
          type: string
      required:
        - title
    ComponentTypeValueExtractor:
      discriminator:
        propertyName: _type
      oneOf:
        - $ref: "#/components/schemas/ComponentTypeSource"
        - $ref: "#/components/schemas/CompositeSource"
        - $ref: "#/components/schemas/ConstantSource"
        - $ref: "#/components/schemas/HealthSource"
        - $ref: "#/components/schemas/IdentifiersSource"
        - $ref: "#/components/schemas/LastUpdatedTimestampSource"
        - $ref: "#/components/schemas/NameSource"
        - $ref: "#/components/schemas/PropertySource"
        - $ref: "#/components/schemas/TagSource"
        - $ref: "#/components/schemas/TagsSource"
    ComponentTypeSource:
      properties:
        _type:
          type: string
          enum:
            - ComponentTypeSource
      required:
        - _type
    CompositeSource:
      properties:
        _type:
          type: string
          enum:
            - CompositeSource
        sources:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ComponentTypeValueExtractor"
      required:
        - _type
        - sources
    ConstantSource:
      properties:
        _type:
          type: string
          enum:
            - ConstantSource
        value:
          type: string
      required:
        - _type
        - value
    HealthSource:
      properties:
        _type:
          type: string
          enum:
            - HealthSource
      required:
        - _type
    IdentifiersSource:
      properties:
        _type:
          type: string
          enum:
            - IdentifiersSource
      required:
        - _type
    LastUpdatedTimestampSource:
      properties:
        _type:
          type: string
          enum:
            - LastUpdatedTimestampSource
      required:
        - _type
    NameSource:
      properties:
        _type:
          type: string
          enum:
            - NameSource
      required:
        - _type
    PropertySource:
      properties:
        _type:
          type: string
          enum:
            - PropertySource
        key:
          type: string
        defaultValue:
          type: string
      required:
        - _type
        - key
    TagSource:
      properties:
        _type:
          type: string
          enum:
            - TagSource
        tagName:
          type: string
      required:
        - _type
        - tagName
    TagsSource:
      properties:
        _type:
          type: string
          enum:
            - TagsSource
      required:
        - _type
    ComponentTypeFieldDisplay:
      discriminator:
        propertyName: _type
      oneOf:
        - $ref: "#/components/schemas/ComponentLinkDisplay"
        - $ref: "#/components/schemas/DurationDisplay"
        - $ref: "#/components/schemas/HealthBadgeDisplay"
        - $ref: "#/components/schemas/HealthCircleDisplay"
        - $ref: "#/components/schemas/PromqlDisplay"
        - $ref: "#/components/schemas/RatioDisplay"
        - $ref: "#/components/schemas/ReadyStatusDisplay"
        - $ref: "#/components/schemas/TagDisplay"
        - $ref: "#/components/schemas/TextDisplay"
        - $ref: "#/components/schemas/ViewTimeLink"
      required:
        - _type
    ComponentLinkDisplay:
      properties:
        _type:
          type: string
          enum:
            - ComponentLinkDisplay
      required:
        - _type
    DurationDisplay:
      properties:
        _type:
          type: string
          enum:
            - DurationDisplay
      required:
        - _type
    HealthBadgeDisplay:
      properties:
        _type:
          type: string
          enum:
            - HealthBadgeDisplay
      required:
        - _type
    HealthCircleDisplay:
      properties:
        _type:
          type: string
          enum:
            - HealthCircleDisplay
      required:
        - _type
    PromqlDisplay:
      properties:
        _type:
          type: string
          enum:
            - PromqlDisplay
      required:
        - _type
    RatioDisplay:
      properties:
        _type:
          type: string
          enum:
            - RatioDisplay
      required:
        - _type
    ReadyStatusDisplay:
      properties:
        _type:
          type: string
          enum:
            - RatioDisplay
      required:
        - _type
    TagDisplay:
      properties:
        _type:
          type: string
          enum:
            - TagDisplay
        singular:
          type: string
      required:
        - _type
    TextDisplay:
      properties:
        _type:
          type: string
          enum:
            - TextDisplay
      required:
        - _type
    ViewTimeLink:
      properties:
        _type:
          type: string
          enum:
            - ViewTimeLink
      required:
        - _type
    ComponentTypeEvents:
      properties:
        showEvents:
          type: boolean
        relatedResourcesTemplate:
          type: string
      required:
        - showEvents
    ComponentTypeExternalComponent:
      properties:
        showConfiguration:
          type: boolean
        showStatus:
          type: boolean
        externalIdSelector:
          type: string
      required:
        - showConfiguration
        - showStatus
        - externalIdSelector
    ComponentTypeRelatedResources:
      properties:
        resourceType:
          type: string
        title:
          type: string
        stql:
          type: string
        hint:
          type: string
        viewTypeIdentifier:
          type: string
      required:
        - resourceType
        - title
        - stql
    ComponentHighlightMetrics:
      properties:
        name:
          type: string
        description:
          type: string
        bindings:
          type: array
          items:
            type: string
        defaultExpanded:
          type: boolean
      required:
        - name
        - bindings
        - defaultExpanded

    DependencyType:
      enum:
        - UNCLASSIFIED
        - HIERARCHICAL
        - CONNECTION
      type: string

    ViewTypeOverview:
      properties:
        columns:
          type: array
          items:
            $ref: "#/components/schemas/ViewTypeTableCol"
      required:
        - columns

    ViewTypeTableCol:
      properties:
        _type:
          type: string
      oneOf:
        - $ref: "#/components/schemas/ViewTypeTableColHealth"
        - $ref: "#/components/schemas/ViewTypeTableColName"
        - $ref: "#/components/schemas/ViewTypeTableColText"
        - $ref: "#/components/schemas/ViewTypeTableColNumber"
        - $ref: "#/components/schemas/ViewTypeTableColTime"
        - $ref: "#/components/schemas/ViewTypeTableColDuration"
        - $ref: "#/components/schemas/ViewTypeTableColComponentType"
        - $ref: "#/components/schemas/ViewTypeTableColComponentLink"
        - $ref: "#/components/schemas/ViewTypeTableColReadyStatus"
        - $ref: "#/components/schemas/ViewTypeTableColContainerImageLink"
        - $ref: "#/components/schemas/ViewTypeTableColPromql"
        - $ref: "#/components/schemas/ViewTypeTableColRatio"
        - $ref: "#/components/schemas/ViewTypeTableColMetricBinding"
      discriminator:
        propertyName: _type
      required:
        - _type

    ViewTypeTableColHealth:
      properties:
        _type:
          type: string
          enum: [ViewTypeTableColHealth]
      required:
        - _type

    ViewTypeTableColName:
      properties:
        _type:
          type: string
          enum: [ViewTypeTableColName]
        title:
          type: string
      required:
        - _type
        - title

    ViewTypeTableColText:
      properties:
        _type:
          type: string
          enum: [ViewTypeTableColText]
        title:
          type: string
        path:
          type: array
          items:
            type: string
        width:
          type: integer
          format: int32
        align:
          # TBH, only the value "right" is interpreted
          type: string
      required:
        - _type
        - title
        - path

    ViewTypeTableColNumber:
      properties:
        _type:
          type: string
          enum: [ViewTypeTableColNumber]
        title:
          type: string
        path:
          type: array
          items:
            type: string
        width:
          type: integer
          format: int32
        unit:
          # TBH, only the value "right" is interpreted
          type: string
      required:
        - _type
        - title
        - path

    ViewTypeTableColTime:
      properties:
        _type:
          type: string
          enum: [ViewTypeTableColTime]
        title:
          type: string
        path:
          type: array
          items:
            type: string
      required:
        - _type
        - title
        - path

    ViewTypeTableColDuration:
      properties:
        _type:
          type: string
          enum: [ViewTypeTableColDuration]
        title:
          type: string
        path:
          type: array
          items:
            type: string
        endDatePath:
          type: array
          items:
            type: string
      required:
        - _type
        - title
        - path

    ViewTypeTableColComponentType:
      properties:
        _type:
          type: string
          enum: [ViewTypeTableColComponentType]
        title:
          type: string
        width:
          type: integer
          format: int32
      required:
        - _type
        - title

    ViewTypeTableColComponentLink:
      properties:
        _type:
          type: string
          enum: [ViewTypeTableColComponentLink]
        title:
          type: string
        labelPrefix:
          type: string
        pathToIdentifier:
          type: array
          items:
            type: string
        width:
          type: integer
          format: int32
      required:
        - _type
        - title
        - labelPrefix
        - pathToIdentifier

    ViewTypeTableColReadyStatus:
      properties:
        _type:
          type: string
          enum: [ViewTypeTableColComponentReadyStatus]
        title:
          type: string
        readyPath:
          type: array
          items:
            type: string
        totalPath:
          type: array
          items:
            type: string
        statusPath:
          type: array
          items:
            type: string
      required:
        - _type
        - title
        - readyPath
        - totalPath
        - statusPath

    ViewTypeTableColContainerImageLink:
      properties:
        _type:
          type: string
          enum: [ViewTypeTableColContainerImageLink]
        title:
          type: string
        imageIdPath:
          type: array
          items:
            type: string
        imagePath:
          type: array
          items:
            type: string
        width:
          type: integer
          format: int32
      required:
        - _type
        - title
        - imageIdPath
        - imagePath

    ViewTypeTableColPromql:
      properties:
        _type:
          type: string
          enum: [ViewTypeTableColPromql]
        title:
          type: string
        query:
          type: string
        componentIdentifierTemplate:
          type: string
        unit:
          type: string
        width:
          type: integer
          format: int32
      required:
        - _type
        - title
        - query
        - componentIdentifierTemplate

    ViewTypeTableColRatio:
      properties:
        _type:
          type: string
          enum: [ViewTypeTableColRatio]
        title:
          type: string
        numeratorPath:
          type: array
          items:
            type: string
        denominatorPath:
          type: array
          items:
            type: string
      required:
        - _type
        - title
        - numeratorPath
        - denominatorPath

    ViewTypeTableColMetricBinding:
      properties:
        _type:
          type: string
          enum: [ViewTypeTableColMetricBinding]
        title:
          type: string
        metricBindingIdentifier:
          type: string
        width:
          type: integer
          format: int32
        onlyTrendLine:
          type: boolean
          default: false
      required:
        - _type
        - title
        - metricBindingIdentifier
        - onlyTrendLine

    ViewTypeFlagValue:
      type: string
      enum:
        - NoTopologyFilters
        - CardsLayout

    ComponentPresentationFilter:
      type: object
      properties:
        filterId:
          type: string
          description: |
            Stable identity used for deduplication and cross-stackpack compatibility.
        displayName:
          $ref: "#/components/schemas/FilterName"
        menuSection:
          type: string
          description: |
            Label to group filters in the UI.
        filter:
          $ref: "#/components/schemas/ComponentPresentationFilterDefinition"
      required:
        - filterId
      description: |
        Filter definition for ComponentPresentation.
        When only `filterId` is provided, the filter references a definition from a less specific presentation.
        Merge semantics for matching ComponentPresentations:
        1) The most specific matching ComponentPresentation's filter list determines which `filterId`s are active.
           Only filters whose `filterId` appears in that list are rendered.
        2) For each active `filterId`, scalar fields (`displayName`, `menuSection`, `filter`, etc.) are resolved by
           falling back through less specific presentations that define the same `filterId`, most specific value wins.
        3) Array position determines display order: earlier items are primary (filter bar),
           later items are secondary ("More" section).

    ComponentPresentationFilterDefinition:
      oneOf:
        - $ref: "#/components/schemas/TagFilter"
      discriminator:
        propertyName: _type

    TagFilter:
      type: object
      properties:
        _type:
          type: string
          enum: [TagFilter]
        tagKey:
          type: string
          description: Tag key used for filtering and value lookup.
      required:
        - _type
        - tagKey
      description: |
        Tag-based filter. Uses indexed tags via `tagKey`.

    ViewTypeFilter:
      properties:
        _type:
          type: string
      oneOf:
        - $ref: "#/components/schemas/LabelPrefixedFilter"
        - $ref: "#/components/schemas/TopologyFilters"
      discriminator:
        propertyName: _type
      required:
        - _type

    LabelPrefixedFilter:
      properties:
        _type:
          type: string
          enum: [LabelPrefixedFilter]
        prefix:
          type: string
        name:
          type: string
      required:
        - _type
        - prefix
        - name

    TopologyFilters:
      properties:
        _type:
          type: string
          enum: [TopologyFilters]
        tabs:
          type: array
          items:
            $ref: "#/components/schemas/TopologyFilterValue"
      required:
        - _type
        - tabs

    TopologyFilterValue:
      type: string
      enum:
        - TOPOLOGY
        - EVENTS
        - TRACES

    PresentationHighlightProvisioning:
      type: object
      properties:
        externalComponentSelector:
          type: string
          description: 'Cel expression that selects the external component with provisioning details'
        showConfiguration:
          type: boolean
        showStatus:
          type: boolean
