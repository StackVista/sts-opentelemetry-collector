# OpenApi header is included in this file to support code highlighting in VSCode
openapi: 3.0.3
info:
  title: Structures common to settings and api
  version: "1.0.0"

components:
  schemas:
    ComponentPresentationQueryBinding:
      type: object
      properties:
        query:
          type: string
          description: 'Stq query that defines to which components does the presentation applies to.'
      required:
        - query

    ComponentPresentationRank:
      type: object
      properties:
        specificity:
          type: number
          format: double
          description: 'Determines how much of a "specialization" this presentation is. Higher number means more specific. This is used to determine which presentation to use when multiple presentations match.'
      required:
        - specificity

    PresentationDefinition:
      type: object
      properties:
        icon:
          type: string
        overview:
          $ref: "#/components/schemas/PresentationOverview"
        highlight:
          $ref: "#/components/schemas/PresentationHighlight"

    PresentationName:
      type: object
      properties:
        singular:
          type: string
        plural:
          type: string
        title:
          type: string
      required:
        - singular
        - plural
        - title

    PresentationOverview:
      type: object
      properties:
        name:
          $ref: "#/components/schemas/PresentationName"
        mainMenu:
          $ref: "#/components/schemas/PresentationMainMenu"
        columns:
          type: array
          items:
            $ref: '#/components/schemas/OverviewColumnDefinition'
        fixedColumns:
          type: integer
      description: |
        Overview presentation definition. The `columns` field defines the columns to show in the overview table. The `flags` field can be used to enable/disable functionalities.
        If multiple ComponentPresentations match, columns are merged by `columnId` according to binding rank. Absence of the field means no overview is shown.
      required:
        - title
        - columns
        - name

    PresentationMainMenu:
      type: object
      properties:
        group:
          type: string
        icon:
          type: string
        order:
          type: number
          format: double
      required:
        - group
        - order

    OverviewColumnDefinition:
      type: object
      properties:
        columnId:
          type: string
        title:
          type: string
        projection:
          $ref: "#/components/schemas/ComponentOverviewProjection"
      required:
        - columnId
      description: 'Definition of a column in the overview presentation. The `columnId` field is used to identify the column and merge columns from different presentations. If only the `columnId` is provided, the column will be rendered from the next more specific presentation definition.'

    PresentationHighlight:
      type: object
      properties:
        title:
          type: string
        fields:
          type: array
          items:
            $ref: '#/components/schemas/PresentationHighlightField'
      description: |
        Highlight presentation definition. The `fields` define the fields to show in the ab. The `flags` field can be used to enable/disable functionalities.
        If multiple ComponentPresentations match, columns are merged by `columnId` according to binding rank. Absence of the field means no overview is shown.
      required:
        - title
        - fields

    PresentationHighlightField:
      type: object
      properties:
        fieldId:
          type: string
        title:
          type: string
        description:
          type: string
        order:
          type: number
          format: double
        projection:
          $ref: "#/components/schemas/ComponentHighlightProjection"
      required:
        - fieldId
        - title
        - order
      description: 'Definition of a field in the highlight presentation. The `fieldId` field is used to identify the field and merge fields from different presentations.'

    ComponentHighlightProjection:
      discriminator:
        propertyName: _type
      oneOf:
        - $ref: '#/components/schemas/HealthProjection'
        - $ref: '#/components/schemas/MetricProjection'
        - $ref: '#/components/schemas/ComponentLinkProjection'
        - $ref: '#/components/schemas/TextProjection'
        - $ref: '#/components/schemas/NumericProjection'
        - $ref: '#/components/schemas/DurationProjection'
        - $ref: '#/components/schemas/RatioProjection'
        - $ref: '#/components/schemas/ContainerImageProjection'
        - $ref: '#/components/schemas/MapProjection'
      description: 'Display type and value for the field.'

    ComponentOverviewProjection:
      discriminator:
        propertyName: _type
      oneOf:
        - $ref: '#/components/schemas/HealthProjection'
        - $ref: '#/components/schemas/MetricProjection'
        - $ref: '#/components/schemas/ComponentLinkProjection'
        - $ref: '#/components/schemas/TextProjection'
        - $ref: '#/components/schemas/NumericProjection'
        - $ref: '#/components/schemas/DurationProjection'
        - $ref: '#/components/schemas/RatioProjection'
        - $ref: '#/components/schemas/ContainerImageProjection'
      description: 'Display type and value for the field.'

    HealthProjection:
      type: object
      properties:
        _type:
          type: string
          enum: [HealthProjection]
        value:
          type: string
          description: 'Cel expression that returns a string that represents a valid HealthState'
      required:
        - _type
        - value
    MapProjection:
      type: object
      properties:
        _type:
          type: string
          enum: [MapProjection]
        value:
          type: string
          description: 'Cel expression that returns a map<string,dyn>'
        asTags:
          type: boolean
          default: true
      required:
        - _type
        - value
    MetricProjection:
      type: object
      properties:
        _type:
          type: string
          enum: [MetricProjection]
        showChart:
          type: boolean
        decimalPlaces:
          type: integer
        unit:
          type: string
        query:
          type: string
          description: "Individual metric query that returns a timeseries for a specific cell."
      required:
        - _type
        - query
    ComponentLinkProjection:
      type: object
      properties:
        _type:
          type: string
          enum: [ComponentLinkProjection]
        name:
          type: string
          description: 'Cel expression that returns a string that represents the name of the component to link to'
        identifier:
          type: string
          description: 'Cel expression that returns a string that represents the identifier in order to build the link'
      required:
        - _type
        - name
        - identifier
    TextProjection:
      type: object
      properties:
        _type:
          type: string
          enum: [TextProjection]
        value:
          type: string
          description: 'Cel expression that returns a string'
        asTag:
          type: boolean
          default: false
          description: 'Should the value be rendered as a tag or as plain text'
      required:
        - _type
        - value
    NumericProjection:
      type: object
      properties:
        _type:
          type: string
          enum: [NumericProjection]
        value:
          type: string
          description: 'Cel expression that returns a number'
        unit:
          type: string
          nullable: true
        decimalPlaces:
          type: integer
      required:
        - _type
        - value
    DurationProjection:
      type: object
      properties:
        _type:
          type: string
          enum: [DurationProjection]
        startTime:
          type: string
          description: 'Cel expression that returns an ISO8601 formatted timestamp'
        endTime:
          type: string
          description: 'Cel expression that returns an ISO8601 formatted timestamp'
      required:
        - _type
        - startTime

    RatioProjection:
      type: object
      description: 'Helps rendering columns that summarize success rates'
      properties:
        _type:
          type: string
          enum: [RatioProjection]
        numerator:
          type: string
          description: 'Cel expression that returns a number'
        denominator:
          type: string
          description: 'Cel expression that returns a number'
        status:
          type: string
          description: 'Cel expression that returns a string that represents a valid HealthState'
      required:
        - _type
        - numerator
        - denominator

    ContainerImageProjection:
      type: object
      description: 'Helps rendering links for docker images'
      properties:
        _type:
          type: string
          enum: [ContainerImageProjection]
        imageId:
          type: string
          description: 'Cel expression that returns a string'
        imageName:
          type: string
          description: 'Cel expression that returns a string'
      required:
        - _type
        - imageId
        - imageName

    ComponentTypeHighlights:
      properties:
        namePlural:
          type: string
        fields:
          type: array
          items:
            $ref: "#/components/schemas/ComponentTypeField"
        about:
          $ref: "#/components/schemas/ComponentTypeAbout"
        events:
          $ref: "#/components/schemas/ComponentTypeEvents"
        showLogs:
          type: boolean
        showLastChange:
          type: boolean
        externalComponent:
          $ref: "#/components/schemas/ComponentTypeExternalComponent"
        relatedResources:
          type: array
          items:
            $ref: "#/components/schemas/ComponentTypeRelatedResources"
        metrics:
          type: array
          items:
            $ref: "#/components/schemas/ComponentHighlightMetrics"
      required:
        - namePlural
        - fields
        - about
        - events
        - showLogs
        - showLastChange
        - externalComponent
        - relatedResources
        - metrics

    ComponentTypeAbout:
      properties:
        fields:
          type: array
          items:
            type: string
      required:
        - fields
    ComponentTypeField:
      properties:
        fieldId:
          type: string
        label:
          $ref: "#/components/schemas/ComponentTypeLabel"
        valueExtractor:
          $ref: "#/components/schemas/ComponentTypeValueExtractor"
        display:
          $ref: "#/components/schemas/ComponentTypeFieldDisplay"
      required:
        - fieldId
        - label
        - valueExtractor
        - display
    ComponentTypeLabel:
      properties:
        title:
          type: string
        helpBubbleText:
          type: string
      required:
        - title
    ComponentTypeValueExtractor:
      discriminator:
        propertyName: _type
      oneOf:
        - $ref: "#/components/schemas/ComponentTypeSource"
        - $ref: "#/components/schemas/CompositeSource"
        - $ref: "#/components/schemas/ConstantSource"
        - $ref: "#/components/schemas/HealthSource"
        - $ref: "#/components/schemas/IdentifiersSource"
        - $ref: "#/components/schemas/LastUpdatedTimestampSource"
        - $ref: "#/components/schemas/NameSource"
        - $ref: "#/components/schemas/PropertySource"
        - $ref: "#/components/schemas/TagSource"
        - $ref: "#/components/schemas/TagsSource"
    ComponentTypeSource:
      properties:
        _type:
          type: string
          enum:
            - ComponentTypeSource
      required:
        - _type
    CompositeSource:
      properties:
        _type:
          type: string
          enum:
            - CompositeSource
        sources:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ComponentTypeValueExtractor"
      required:
        - _type
        - sources
    ConstantSource:
      properties:
        _type:
          type: string
          enum:
            - ConstantSource
        value:
          type: string
      required:
        - _type
        - value
    HealthSource:
      properties:
        _type:
          type: string
          enum:
            - HealthSource
      required:
        - _type
    IdentifiersSource:
      properties:
        _type:
          type: string
          enum:
            - IdentifiersSource
      required:
        - _type
    LastUpdatedTimestampSource:
      properties:
        _type:
          type: string
          enum:
            - LastUpdatedTimestampSource
      required:
        - _type
    NameSource:
      properties:
        _type:
          type: string
          enum:
            - NameSource
      required:
        - _type
    PropertySource:
      properties:
        _type:
          type: string
          enum:
            - PropertySource
        key:
          type: string
        defaultValue:
          type: string
      required:
        - _type
        - key
    TagSource:
      properties:
        _type:
          type: string
          enum:
            - TagSource
        tagName:
          type: string
      required:
        - _type
        - tagName
    TagsSource:
      properties:
        _type:
          type: string
          enum:
            - TagsSource
      required:
        - _type
    ComponentTypeFieldDisplay:
      discriminator:
        propertyName: _type
      oneOf:
        - $ref: "#/components/schemas/ComponentLinkDisplay"
        - $ref: "#/components/schemas/DurationDisplay"
        - $ref: "#/components/schemas/HealthBadgeDisplay"
        - $ref: "#/components/schemas/HealthCircleDisplay"
        - $ref: "#/components/schemas/PromqlDisplay"
        - $ref: "#/components/schemas/RatioDisplay"
        - $ref: "#/components/schemas/ReadyStatusDisplay"
        - $ref: "#/components/schemas/TagDisplay"
        - $ref: "#/components/schemas/TextDisplay"
        - $ref: "#/components/schemas/ViewTimeLink"
      required:
        - _type
    ComponentLinkDisplay:
      properties:
        _type:
          type: string
          enum:
            - ComponentLinkDisplay
      required:
        - _type
    DurationDisplay:
      properties:
        _type:
          type: string
          enum:
            - DurationDisplay
      required:
        - _type
    HealthBadgeDisplay:
      properties:
        _type:
          type: string
          enum:
            - HealthBadgeDisplay
      required:
        - _type
    HealthCircleDisplay:
      properties:
        _type:
          type: string
          enum:
            - HealthCircleDisplay
      required:
        - _type
    PromqlDisplay:
      properties:
        _type:
          type: string
          enum:
            - PromqlDisplay
      required:
        - _type
    RatioDisplay:
      properties:
        _type:
          type: string
          enum:
            - RatioDisplay
      required:
        - _type
    ReadyStatusDisplay:
      properties:
        _type:
          type: string
          enum:
            - RatioDisplay
      required:
        - _type
    TagDisplay:
      properties:
        _type:
          type: string
          enum:
            - TagDisplay
        singular:
          type: string
      required:
        - _type
    TextDisplay:
      properties:
        _type:
          type: string
          enum:
            - TextDisplay
      required:
        - _type
    ViewTimeLink:
      properties:
        _type:
          type: string
          enum:
            - ViewTimeLink
      required:
        - _type
    ComponentTypeEvents:
      properties:
        showEvents:
          type: boolean
        relatedResourcesTemplate:
          type: string
      required:
        - showEvents
    ComponentTypeExternalComponent:
      properties:
        showConfiguration:
          type: boolean
        showStatus:
          type: boolean
        externalIdSelector:
          type: string
      required:
        - showConfiguration
        - showStatus
        - externalIdSelector
    ComponentTypeRelatedResources:
      properties:
        resourceType:
          type: string
        title:
          type: string
        stql:
          type: string
        hint:
          type: string
        viewTypeIdentifier:
          type: string
      required:
        - resourceType
        - title
        - stql
    ComponentHighlightMetrics:
      properties:
        name:
          type: string
        description:
          type: string
        bindings:
          type: array
          items:
            type: string
        defaultExpanded:
          type: boolean
      required:
        - name
        - bindings
        - defaultExpanded

    DependencyType:
      enum:
        - UNCLASSIFIED
        - HIERARCHICAL
        - CONNECTION
      type: string

    ViewTypeOverview:
      properties:
        columns:
          type: array
          items:
            $ref: "#/components/schemas/ViewTypeTableCol"
      required:
        - columns

    ViewTypeTableCol:
      properties:
        _type:
          type: string
      oneOf:
        - $ref: "#/components/schemas/ViewTypeTableColHealth"
        - $ref: "#/components/schemas/ViewTypeTableColName"
        - $ref: "#/components/schemas/ViewTypeTableColText"
        - $ref: "#/components/schemas/ViewTypeTableColNumber"
        - $ref: "#/components/schemas/ViewTypeTableColTime"
        - $ref: "#/components/schemas/ViewTypeTableColDuration"
        - $ref: "#/components/schemas/ViewTypeTableColComponentType"
        - $ref: "#/components/schemas/ViewTypeTableColComponentLink"
        - $ref: "#/components/schemas/ViewTypeTableColReadyStatus"
        - $ref: "#/components/schemas/ViewTypeTableColContainerImageLink"
        - $ref: "#/components/schemas/ViewTypeTableColPromql"
        - $ref: "#/components/schemas/ViewTypeTableColRatio"
        - $ref: "#/components/schemas/ViewTypeTableColMetricBinding"
      discriminator:
        propertyName: _type
      required:
        - _type

    ViewTypeTableColHealth:
      properties:
        _type:
          type: string
          enum: [ViewTypeTableColHealth]
      required:
        - _type

    ViewTypeTableColName:
      properties:
        _type:
          type: string
          enum: [ViewTypeTableColName]
        title:
          type: string
      required:
        - _type
        - title

    ViewTypeTableColText:
      properties:
        _type:
          type: string
          enum: [ViewTypeTableColText]
        title:
          type: string
        path:
          type: array
          items:
            type: string
        width:
          type: integer
          format: int32
        align:
          # TBH, only the value "right" is interpreted
          type: string
      required:
        - _type
        - title
        - path

    ViewTypeTableColNumber:
      properties:
        _type:
          type: string
          enum: [ViewTypeTableColNumber]
        title:
          type: string
        path:
          type: array
          items:
            type: string
        width:
          type: integer
          format: int32
        unit:
          # TBH, only the value "right" is interpreted
          type: string
      required:
        - _type
        - title
        - path

    ViewTypeTableColTime:
      properties:
        _type:
          type: string
          enum: [ViewTypeTableColTime]
        title:
          type: string
        path:
          type: array
          items:
            type: string
      required:
        - _type
        - title
        - path

    ViewTypeTableColDuration:
      properties:
        _type:
          type: string
          enum: [ViewTypeTableColDuration]
        title:
          type: string
        path:
          type: array
          items:
            type: string
        endDatePath:
          type: array
          items:
            type: string
      required:
        - _type
        - title
        - path

    ViewTypeTableColComponentType:
      properties:
        _type:
          type: string
          enum: [ViewTypeTableColComponentType]
        title:
          type: string
        width:
          type: integer
          format: int32
      required:
        - _type
        - title

    ViewTypeTableColComponentLink:
      properties:
        _type:
          type: string
          enum: [ViewTypeTableColComponentLink]
        title:
          type: string
        labelPrefix:
          type: string
        pathToIdentifier:
          type: array
          items:
            type: string
        width:
          type: integer
          format: int32
      required:
        - _type
        - title
        - labelPrefix
        - pathToIdentifier

    ViewTypeTableColReadyStatus:
      properties:
        _type:
          type: string
          enum: [ViewTypeTableColComponentReadyStatus]
        title:
          type: string
        readyPath:
          type: array
          items:
            type: string
        totalPath:
          type: array
          items:
            type: string
        statusPath:
          type: array
          items:
            type: string
      required:
        - _type
        - title
        - readyPath
        - totalPath
        - statusPath

    ViewTypeTableColContainerImageLink:
      properties:
        _type:
          type: string
          enum: [ViewTypeTableColContainerImageLink]
        title:
          type: string
        imageIdPath:
          type: array
          items:
            type: string
        imagePath:
          type: array
          items:
            type: string
        width:
          type: integer
          format: int32
      required:
        - _type
        - title
        - imageIdPath
        - imagePath

    ViewTypeTableColPromql:
      properties:
        _type:
          type: string
          enum: [ViewTypeTableColPromql]
        title:
          type: string
        query:
          type: string
        componentIdentifierTemplate:
          type: string
        unit:
          type: string
        width:
          type: integer
          format: int32
      required:
        - _type
        - title
        - query
        - componentIdentifierTemplate

    ViewTypeTableColRatio:
      properties:
        _type:
          type: string
          enum: [ViewTypeTableColRatio]
        title:
          type: string
        numeratorPath:
          type: array
          items:
            type: string
        denominatorPath:
          type: array
          items:
            type: string
      required:
        - _type
        - title
        - numeratorPath
        - denominatorPath

    ViewTypeTableColMetricBinding:
      properties:
        _type:
          type: string
          enum: [ViewTypeTableColMetricBinding]
        title:
          type: string
        metricBindingIdentifier:
          type: string
        width:
          type: integer
          format: int32
        onlyTrendLine:
          type: boolean
          default: false
      required:
        - _type
        - title
        - metricBindingIdentifier
        - onlyTrendLine

    ViewTypeFlagValue:
      type: string
      enum:
        - NoTopologyFilters
        - CardsLayout

    ViewTypeFilter:
      properties:
        _type:
          type: string
      oneOf:
        - $ref: "#/components/schemas/LabelPrefixedFilter"
        - $ref: "#/components/schemas/TopologyFilters"
      discriminator:
        propertyName: _type
      required:
        - _type

    LabelPrefixedFilter:
      properties:
        _type:
          type: string
          enum: [LabelPrefixedFilter]
        prefix:
          type: string
        name:
          type: string
      required:
        - _type
        - prefix
        - name

    TopologyFilters:
      properties:
        _type:
          type: string
          enum: [TopologyFilters]
        tabs:
          type: array
          items:
            $ref: "#/components/schemas/TopologyFilterValue"
      required:
        - _type
        - tabs

    TopologyFilterValue:
      type: string
      enum:
        - TOPOLOGY
        - EVENTS
        - TRACES


